<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34A93A"/>
      <stop offset="100%" stop-color="#2E8B34"/>
    </linearGradient>
    <filter id="inner">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"/>

  <!-- Subtle top highlight -->
  <rect x="4" y="4" width="120" height="60" rx="28" fill="white" fill-opacity="0.08"/>

  <!-- T letter -->
  <text x="64" y="92" font-family="Arial Black, Arial, sans-serif" font-size="88" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-2">T</text>
</svg>
