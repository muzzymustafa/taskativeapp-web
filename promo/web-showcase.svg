<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FAFBFA"/>
    </linearGradient>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="12" stdDeviation="28" flood-color="#2E8B34" flood-opacity="0.15"/>
    </filter>
  </defs>
  <style>
    text { font-family: Arial, sans-serif; }
  </style>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Browser window -->
  <g transform="translate(80, 80)" filter="url(#dropShadow)">
    <rect x="0" y="0" width="1040" height="640" rx="18" fill="#FFFFFF"/>

    <!-- Browser chrome bar -->
    <rect x="0" y="0" width="1040" height="52" rx="18" fill="#F4F6F4"/>
    <rect x="0" y="34" width="1040" height="18" fill="#F4F6F4"/>
    <circle cx="26" cy="26" r="8" fill="#FF6B7A"/>
    <circle cx="50" cy="26" r="8" fill="#FFD58E"/>
    <circle cx="74" cy="26" r="8" fill="#5EEEA0"/>

    <!-- URL bar -->
    <rect x="110" y="16" width="620" height="22" rx="11" fill="#FFFFFF" stroke="#E4E7E5"/>
    <text x="126" y="31" font-size="12" font-family="monospace" fill="#6B7280">🔒 taskativeapp.com/timeline</text>

    <!-- Tab area indicator (browser tabs) -->
    <rect x="760" y="14" width="80" height="24" rx="12" fill="#2E8B34" fill-opacity="0.1"/>
    <text x="775" y="30" font-size="11" font-weight="700" fill="#2E8B34">Taskative</text>

    <!-- App header -->
    <rect x="0" y="52" width="1040" height="56" fill="#FFFFFF"/>
    <line x1="0" y1="108" x2="1040" y2="108" stroke="#E4E7E5"/>

    <!-- Logo in header -->
    <rect x="24" y="70" width="24" height="24" rx="6" fill="#2E8B34"/>
    <text x="36" y="87" font-size="14" font-weight="900" fill="white" text-anchor="middle">T</text>
    <text x="56" y="87" font-size="14" font-weight="700" fill="#111827">Taskative</text>

    <!-- Nav pills -->
    <g transform="translate(200, 66)">
      <rect x="0" y="0" width="420" height="32" rx="16" fill="#F4F6F4"/>
      <rect x="4" y="4" width="80" height="24" rx="12" fill="#FFFFFF"/>
      <text x="44" y="20" font-size="11" font-weight="600" fill="#2E8B34" text-anchor="middle">Timeline</text>
      <text x="116" y="20" font-size="11" fill="#6B7280" text-anchor="middle">Calendar</text>
      <text x="188" y="20" font-size="11" fill="#6B7280" text-anchor="middle">Tasks</text>
      <text x="260" y="20" font-size="11" fill="#6B7280" text-anchor="middle">Groups</text>
      <text x="340" y="20" font-size="11" fill="#6B7280" text-anchor="middle">Reports</text>
    </g>

    <!-- User avatar -->
    <circle cx="1000" cy="82" r="14" fill="#2E8B34"/>
    <text x="1000" y="87" font-size="12" font-weight="700" fill="white" text-anchor="middle">A</text>

    <!-- Timeline content -->
    <text x="24" y="148" font-size="22" font-weight="800" fill="#111827">Timeline</text>
    <text x="24" y="172" font-size="12" fill="#6B7280">April 14 – May 13</text>

    <!-- Timeline header — day columns -->
    <g transform="translate(200, 130)">
      <rect x="0" y="0" width="820" height="28" rx="6" fill="#F4F6F4"/>
      <text x="30" y="18" font-size="10" font-weight="600" fill="#6B7280">MON</text>
      <text x="90" y="18" font-size="10" font-weight="600" fill="#6B7280">TUE</text>
      <text x="150" y="18" font-size="10" font-weight="600" fill="#6B7280">WED</text>
      <text x="210" y="18" font-size="10" font-weight="600" fill="#6B7280">THU</text>
      <text x="270" y="18" font-size="10" font-weight="600" fill="#6B7280">FRI</text>
      <text x="330" y="18" font-size="10" font-weight="600" fill="#6B7280">SAT</text>
      <text x="390" y="18" font-size="10" font-weight="600" fill="#6B7280">SUN</text>
      <text x="450" y="18" font-size="10" font-weight="600" fill="#6B7280">MON</text>
      <text x="510" y="18" font-size="10" font-weight="600" fill="#6B7280">TUE</text>
      <text x="570" y="18" font-size="10" font-weight="600" fill="#6B7280">WED</text>
      <text x="630" y="18" font-size="10" font-weight="600" fill="#6B7280">THU</text>
      <text x="690" y="18" font-size="10" font-weight="600" fill="#6B7280">FRI</text>
      <text x="750" y="18" font-size="10" font-weight="600" fill="#6B7280">SAT</text>
    </g>

    <!-- Task rows — left label + gantt bar -->
    <g transform="translate(24, 180)">
      <!-- Row 1: Checkout flow (overdue) -->
      <rect x="0" y="0" width="170" height="44" rx="6" fill="#FAFBFA"/>
      <rect x="0" y="0" width="3" height="44" fill="#D9344A"/>
      <text x="12" y="20" font-size="12" font-weight="600" fill="#111827">Checkout flow</text>
      <text x="12" y="35" font-size="10" fill="#6B7280">Design review</text>
      <!-- Bar -->
      <rect x="176" y="12" width="180" height="20" rx="4" fill="#D9344A"/>
      <text x="188" y="26" font-size="10" font-weight="600" fill="white">Review checkout flow</text>

      <!-- Row 2: Landing page (done) -->
      <rect x="0" y="52" width="170" height="44" rx="6" fill="#FAFBFA"/>
      <rect x="0" y="52" width="3" height="44" fill="#5EEEA0"/>
      <text x="12" y="72" font-size="12" font-weight="600" fill="#111827">Landing copy</text>
      <text x="12" y="87" font-size="10" fill="#6B7280">Marketing</text>
      <rect x="300" y="64" width="140" height="20" rx="4" fill="#5EEEA0"/>
      <text x="312" y="78" font-size="10" font-weight="600" fill="#0E2611">Confirm landing copy</text>

      <!-- Row 3: Analytics dashboard -->
      <rect x="0" y="104" width="170" height="44" rx="6" fill="#FAFBFA"/>
      <rect x="0" y="104" width="3" height="44" fill="#2E8B34"/>
      <text x="12" y="124" font-size="12" font-weight="600" fill="#111827">Analytics dashboard</text>
      <text x="12" y="139" font-size="10" fill="#6B7280">Engineering</text>
      <rect x="420" y="116" width="260" height="20" rx="4" fill="#2E8B34"/>
      <text x="432" y="130" font-size="10" font-weight="600" fill="white">Set up analytics</text>

      <!-- Row 4: Privacy policy -->
      <rect x="0" y="156" width="170" height="44" rx="6" fill="#FAFBFA"/>
      <rect x="0" y="156" width="3" height="44" fill="#2E8B34"/>
      <text x="12" y="176" font-size="12" font-weight="600" fill="#111827">Privacy policy</text>
      <text x="12" y="191" font-size="10" fill="#6B7280">Legal</text>
      <rect x="540" y="168" width="200" height="20" rx="4" fill="#2E8B34"/>
      <text x="552" y="182" font-size="10" font-weight="600" fill="white">Update privacy policy</text>

      <!-- Row 5: Mobile app release -->
      <rect x="0" y="208" width="170" height="44" rx="6" fill="#FAFBFA"/>
      <rect x="0" y="208" width="3" height="44" fill="#E8A33D"/>
      <text x="12" y="228" font-size="12" font-weight="600" fill="#111827">Mobile v2.7</text>
      <text x="12" y="243" font-size="10" fill="#6B7280">Product</text>
      <rect x="660" y="220" width="240" height="20" rx="4" fill="#E8A33D"/>
      <text x="672" y="234" font-size="10" font-weight="600" fill="#0E2611">Release mobile v2.7</text>

      <!-- Row 6: Marketing -->
      <rect x="0" y="260" width="170" height="44" rx="6" fill="#FAFBFA"/>
      <rect x="0" y="260" width="3" height="44" fill="#E8A33D"/>
      <text x="12" y="280" font-size="12" font-weight="600" fill="#111827">Launch tweet</text>
      <text x="12" y="295" font-size="10" fill="#6B7280">Marketing</text>
      <rect x="840" y="272" width="80" height="20" rx="4" fill="#E8A33D"/>
      <text x="852" y="286" font-size="10" font-weight="600" fill="#0E2611">Tweet</text>
    </g>

    <!-- Bottom bar with stats -->
    <g transform="translate(24, 530)">
      <text x="0" y="14" font-size="11" font-weight="600" fill="#6B7280">6 TASKS</text>
      <text x="90" y="14" font-size="11" font-weight="600" fill="#2E8B34">3 ACTIVE</text>
      <text x="180" y="14" font-size="11" font-weight="600" fill="#1A9E5C">1 DONE</text>
      <text x="260" y="14" font-size="11" font-weight="600" fill="#D9344A">1 OVERDUE</text>
    </g>
  </g>

  <!-- Bottom caption -->
  <text x="600" y="770" font-size="14" font-weight="600" fill="#6B7280" text-anchor="middle">Full dashboard in any browser</text>
</svg>
