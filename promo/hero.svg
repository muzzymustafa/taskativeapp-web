<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAFBFA"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#2E8B34" flood-opacity="0.15"/>
    </filter>
  </defs>

  <style>
    text { font-family: Arial, sans-serif; }
    .h1 { font-size: 58px; font-weight: 900; fill: #111827; letter-spacing: -1px; }
    .h1-accent { font-size: 58px; font-weight: 900; fill: #2E8B34; letter-spacing: -1px; }
    .sub { font-size: 22px; fill: #6B7280; }
    .brand { font-size: 24px; font-weight: 700; fill: #111827; }
    .chip-label { font-size: 14px; font-weight: 600; fill: #111827; }
    .footer { font-size: 13px; fill: #9CA3AF; }
    .ctx-item { font-size: 12px; fill: #374151; }
    .ctx-active { font-size: 12px; font-weight: 700; fill: #2E8B34; }
    .note-title { font-size: 15px; font-weight: 600; fill: #111827; }
    .note { font-size: 12px; fill: #374151; }
  </style>

  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- Logo + brand -->
  <g transform="translate(80, 70)">
    <rect x="0" y="0" width="52" height="52" rx="12" fill="#2E8B34"/>
    <text x="26" y="36" font-size="28" font-weight="900" fill="white" text-anchor="middle">T</text>
    <text x="70" y="36" class="brand">Taskative</text>
  </g>

  <!-- Main heading - 3 lines to fit -->
  <text x="80" y="250" class="h1">Select text.</text>
  <text x="80" y="320" class="h1">Right-click.</text>
  <text x="80" y="390" class="h1-accent">Done.</text>

  <!-- Subheading -->
  <text x="80" y="450" class="sub">Turn any selected text on any webpage</text>
  <text x="80" y="482" class="sub">into a Taskative task — instantly.</text>

  <!-- Mock browser window with context menu -->
  <g transform="translate(680, 130)" filter="url(#shadow)">
    <rect x="0" y="0" width="520" height="440" rx="16" fill="#FFFFFF" stroke="#E4E7E5"/>

    <!-- Browser dots -->
    <circle cx="24" cy="24" r="6" fill="#FF6B7A"/>
    <circle cx="44" cy="24" r="6" fill="#FFD58E"/>
    <circle cx="64" cy="24" r="6" fill="#5EEEA0"/>

    <!-- URL bar -->
    <rect x="90" y="14" width="410" height="20" rx="10" fill="#F4F6F4"/>
    <text x="102" y="28" font-size="11" font-family="monospace" fill="#9CA3AF">company.com/meeting-notes</text>

    <!-- Content -->
    <text x="28" y="80" class="note-title">Product Launch — Meeting Notes</text>
    <text x="28" y="115" class="note">• Confirm landing page copy with design team</text>
    <text x="28" y="140" class="note">• Set up analytics dashboard by Monday</text>

    <!-- Selected text highlight -->
    <rect x="26" y="155" width="430" height="24" rx="4" fill="#2E8B34" fill-opacity="0.25"/>
    <text x="32" y="173" font-size="12" font-weight="700" fill="#0E2611">• Review checkout flow and test payment flow</text>

    <text x="28" y="210" class="note">• Update privacy policy for EU compliance</text>

    <!-- Context menu -->
    <g transform="translate(110, 215)" filter="url(#shadow)">
      <rect x="0" y="0" width="320" height="180" rx="10" fill="#FFFFFF" stroke="#E4E7E5"/>
      <text x="18" y="28" class="ctx-item">Copy</text>
      <text x="18" y="52" class="ctx-item">Search with Google</text>
      <line x1="10" y1="64" x2="310" y2="64" stroke="#E4E7E5"/>

      <!-- Highlighted: Add to Taskative -->
      <rect x="4" y="72" width="312" height="34" rx="6" fill="#2E8B34" fill-opacity="0.12"/>
      <rect x="14" y="80" width="18" height="18" rx="4" fill="#2E8B34"/>
      <text x="23" y="94" font-size="11" font-weight="900" fill="white" text-anchor="middle">T</text>
      <text x="40" y="94" class="ctx-active">Add to Taskative: "Review...</text>

      <line x1="10" y1="116" x2="310" y2="116" stroke="#E4E7E5"/>
      <text x="18" y="138" class="ctx-item">Print</text>
      <text x="18" y="162" class="ctx-item">Inspect</text>
    </g>
  </g>

  <!-- Feature chips -->
  <g transform="translate(80, 580)">
    <g>
      <rect x="0" y="0" width="190" height="52" rx="26" fill="#FFFFFF" stroke="#E4E7E5" stroke-width="1.5"/>
      <circle cx="32" cy="26" r="14" fill="#E8F5E9"/>
      <text x="32" y="31" font-size="14" font-weight="700" fill="#2E8B34" text-anchor="middle">⚡</text>
      <text x="56" y="31" class="chip-label">Instant capture</text>
    </g>
    <g transform="translate(210, 0)">
      <rect x="0" y="0" width="180" height="52" rx="26" fill="#FFFFFF" stroke="#E4E7E5" stroke-width="1.5"/>
      <circle cx="32" cy="26" r="14" fill="#FFF4DC"/>
      <text x="32" y="31" font-size="14" font-weight="700" fill="#A3650A" text-anchor="middle">🔒</text>
      <text x="56" y="31" class="chip-label">Private &amp; free</text>
    </g>
    <g transform="translate(410, 0)">
      <rect x="0" y="0" width="210" height="52" rx="26" fill="#FFFFFF" stroke="#E4E7E5" stroke-width="1.5"/>
      <circle cx="32" cy="26" r="14" fill="#E3F2FD"/>
      <text x="32" y="31" font-size="14" font-weight="700" fill="#1565C0" text-anchor="middle">📱</text>
      <text x="56" y="31" class="chip-label">Syncs everywhere</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="80" y="750" class="footer">taskativeapp.com · Free forever · Works with Android &amp; Web</text>
</svg>
